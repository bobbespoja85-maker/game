<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PSICOSIS - Inicio</title>
    <link rel="stylesheet" href="css/menu.css">
</head>
<body>

    <div class="menu-container">
        <h1>PSICOSIS</h1>
        <p class="subtitle">El laberinto de la mente</p>

        <div class="settings-box">
            <h3>CONFIGURACIÓN</h3>
            
            <label>
                Sensibilidad del Ratón: <span id="sens-val">50%</span>
                <input type="range" id="sensitivity" min="1" max="100" value="50">
            </label>

            <label>
                Volumen Maestro: <span id="vol-val">50%</span>
                <input type="range" id="volume" min="0" max="100" value="50">
            </label>
            <p class="controls-info">Controles: WASD para moverse. Ratón para mirar. F para Linterna.</p>
        </div>

        <button id="start-btn" class="btn-start">ENTRAR EN EL LABERINTO</button>
    </div>

    <script src="common.js"></script>
    <script>
        const sensInput = document.getElementById('sensitivity');
        const volInput = document.getElementById('volume');
        const sensVal = document.getElementById('sens-val');
        const volVal = document.getElementById('vol-val');
        const startBtn = document.getElementById('start-btn');

        sensInput.addEventListener('input', (e) => sensVal.innerText = e.target.value + '%');
        volInput.addEventListener('input', (e) => volVal.innerText = e.target.value + '%');

        startBtn.addEventListener('click', () => {
            const currentSettings = {
                sensitivity: parseInt(sensInput.value) / 25000, 
                volume: parseInt(volInput.value) / 100
            };
            saveSettings(currentSettings);
            window.location.href = 'game/level1.html';
        });
    </script>
</body>
</html>
