<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOOM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;cursor:none}
canvas{image-rendering:pixelated;image-rendering:crisp-edges}
#title{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:10;cursor:default}

canvas.width = SW; canvas.height = SH + HUD_H;
const imgData = ctx.createImageData(SW, SH);
const px = imgData.data;
const zBuf = new Float64Array(SW);

// Escalar canvas al viewport
function resize(){
  const s = Math.min(innerWidth/SW, innerHeight/(SH+HUD_H));
  canvas.style.width = (SW*s)+'px';
  canvas.style.height = ((SH+HUD_H)*s)+'px';
}
resize(); addEventListener('resize', resize);

// ===================== AUDIO =====================
let ac;
function initAudio(){ ac = new (AudioContext||webkitAudioContext)(); }

function noise(dur, freq, vol){
  if(!ac)return;
  const n = ac.sampleRate*dur, buf = ac.createBuffer(1,n,ac.sampleRate), d = buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(n*0.08));
  const s=ac.createBufferSource(); s.buffer=buf;
  const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=freq;
  const g=ac.createGain(); g.gain.value=vol;
  s.connect(f).connect(g).connect(ac.destination); s.start();
}
function tone(freq, dur, type, vol){
  if(!ac)return;
  const o=ac.createOscillator(); o.frequency.value=freq; o.type=type||'sawtooth';
  const g=ac.createGain(); g.gain.setValueAtTime(vol,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
  o.connect(g).connect(ac.destination); o.start(); o.stop(ac.currentTime+dur);
}
function sndShoot(){ noise(0.18,1800,0.5); tone(80,0.12,'square',0.3); }
function sndHit(){ tone(200,0.08,'square',0.2); noise(0.05,3000,0.15); }
function sndDeath(){ tone(60,0.4,'sawtooth',0.25); noise(0.3,800,0.2); }
function sndPickup(){ tone(440,0.08,'sine',0.15); setTimeout(()=>tone(660,0.1,'sine',0.15),80); }
function sndHurt(){ tone(100,0.15,'square',0.3); noise(0.1,2000,0.2); }
function sndStep(){ noise(0.04,600,0.06); }

// ===================== TEXTURAS =====================
const textures = {};
function mkTex(fn){
  const c=document.createElement('canvas'); c.width=c.height=TEX;
  const x=c.getContext('2d'); fn(x);
  const id=x.getImageData(0,0,TEX,TEX);
  // Agregar ruido
  for(let i=0;i<id.data.length;i+=4){
    const n=Math.random()*12-6;
    id.data[i]=Math.max(0,Math.min(255,id.data[i]+n));
    id.data[i+1]=Math.max(0,Math.min(255,id.data[i+1]+n));
    id.data[i+2]=Math.max(0,Math.min(255,id.data[i+2]+n));
  }
  x.putImageData(id,0,0);
  return x.getImageData(0,0,TEX,TEX).data;
}
function genTextures(){
  // 1: Piedra gris
  textures[1]=mkTex(c=>{
    c.fillStyle='#777'; c.fillRect(0,0,64,64);
    c.fillStyle='#555';
    for(let r=0;r<8;r++){
      c.fillRect(0,r*8,64,1);
      const off=(r%2)*8;
      for(let col=-1;col<5;col++) c.fillRect(off+col*16,r*8,1,8);
    }
  });
  // 2: Madera
  textures[2]=mkTex(c=>{
    c.fillStyle='#7B4513'; c.fillRect(0,0,64,64);
    c.fillStyle='#5C3317';
    for(let i=0;i<8;i++){c.fillRect(i*8,0,1,64);}
    c.fillStyle='#654321';
    for(let r=0;r<4;r++) c.fillRect(0,r*16+15,64,2);
    // Vetas
    c.strokeStyle='rgba(90,50,20,0.4)'; c.lineWidth=0.5;
    for(let i=0;i<20;i++){
      c.beginPath(); c.moveTo(Math.random()*64,0);
      c.lineTo(Math.random()*64,64); c.stroke();
    }
  });
  // 3: Metal oscuro
  textures[3]=mkTex(c=>{
    c.fillStyle='#4a4a4a'; c.fillRect(0,0,64,64);
    c.fillStyle='#383838'; c.fillRect(0,0,64,2); c.fillRect(0,62,64,2);
    c.fillRect(0,0,2,64); c.fillRect(62,0,2,64);
    c.fillStyle='#555';
    c.fillRect(8,8,48,48); c.fillStyle='#3a3a3a';
    c.fillRect(10,10,44,44);
    // Remaches
    c.fillStyle='#666';
    [[6,6],[58,6],[6,58],[58,58]].forEach(p=>{
      c.beginPath(); c.arc(p[0],p[1],3,0,Math.PI*2); c.fill();
      c.fillStyle='#444'; c.beginPath(); c.arc(p[0],p[1],1.5,0,Math.PI*2); c.fill();
      c.fillStyle='#666';
    });
  });
  // 4: Ladrillo rojo
  textures[4]=mkTex(c=>{
    c.fillStyle='#8B3A2A'; c.fillRect(0,0,64,64);
    c.fillStyle='#5A3020';
    for(let r=0;r<8;r++){
      c.fillRect(0,r*8,64,1);
      const off=(r%2)*16;
      for(let col=-1;col<5;col++) c.fillRect(off+col*32,r*8,1,8);
    }
    // Variación por ladrillo
    for(let r=0;r<8;r++){
      const off=(r%2)*16;
      for(let col=-1;col<5;col++){
        const bx=off+col*32+1, by=r*8+1;
        const v=Math.random()*20-10;
        c.fillStyle=`rgb(${140+v|0},${58+v|0},${42+v|0})`;
        c.fillRect(bx,by,30,6);
      }
    }
  });
}

}

// ===================== COLISIÓN =====================
function blocked(x,y){
  const m=0.2;
  return MAP[Math.floor(y-m)][Math.floor(x-m)]>0||
         MAP[Math.floor(y-m)][Math.floor(x+m)]>0||
         MAP[Math.floor(y+m)][Math.floor(x-m)]>0||
         MAP[Math.floor(y+m)][Math.floor(x+m)]>0;
}
function canSee(ex,ey,tx,ty){
  const dx=tx-ex, dy=ty-ey, d=Math.sqrt(dx*dx+dy*dy);
  const steps=Math.ceil(d*5);
  for(let i=0;i<steps;i++){
    const t=i/steps;
    if(MAP[Math.floor(ey+dy*t)][Math.floor(ex+dx*t)]>0) return false;
  }
  return true;
}

// ===================== RAYCASTING =====================
function castRay(rdx,rdy){
  let mx=Math.floor(player.x), my=Math.floor(player.y);
  const ddx=Math.abs(1/(rdx||1e-10)), ddy=Math.abs(1/(rdy||1e-10));
  let sx,sy,sdx,sdy;
  if(rdx<0){sx=-1;sdx=(player.x-mx)*ddx;}else{sx=1;sdx=(mx+1-player.x)*ddx;}
  if(rdy<0){sy=-1;sdy=(player.y-my)*ddy;}else{sy=1;sdy=(my+1-player.y)*ddy;}
  let side=0, hit=false;
  for(let i=0;i<64&&!hit;i++){
    if(sdx<sdy){sdx+=ddx;mx+=sx;side=0;}else{sdy+=ddy;my+=sy;side=1;}
    if(mx<0||mx>=MW||my<0||my>=MH){hit=true;break;}
    if(MAP[my][mx]>0) hit=true;
  }
  let pd= side===0?sdx-ddx:sdy-ddy;
  let wx= side===0? player.y+pd*rdy : player.x+pd*rdx;
  wx-=Math.floor(wx);
  let tx=Math.floor(wx*TEX);
  if((side===0&&rdx>0)||(side===1&&rdy<0)) tx=TEX-tx-1;
  const wt=mx>=0&&mx<MW&&my>=0&&my<MH?MAP[my][mx]:1;
  return {dist:pd,side,tx,mx,my,wt};
}
function castWallDist(rdx,rdy){
  let mx=Math.floor(player.x),my=Math.floor(player.y);
  const ddx=Math.abs(1/(rdx||1e-10)),ddy=Math.abs(1/(rdy||1e-10));
  let sx,sy,sdx,sdy;
  if(rdx<0){sx=-1;sdx=(player.x-mx)*ddx;}else{sx=1;sdx=(mx+1-player.x)*ddx;}
  if(rdy<0){sy=-1;sdy=(player.y-my)*ddy;}else{sy=1;sdy=(my+1-player.y)*ddy;}
  let side=0;
  for(let i=0;i<64;i++){
    if(sdx<sdy){sdx+=ddx;mx+=sx;side=0;}else{sdy+=ddy;my+=sy;side=1;}
    if(mx<0||mx>=MW||my<0||my>=MH) return 100;
    if(MAP[my][mx]>0) return side===0?sdx-ddx:sdy-ddy;
  }
  return 100;
}

// ===================== RENDERIZADO 3D =====================
function renderScene(){
  const dirX=Math.cos(player.angle), dirY=Math.sin(player.angle);
  const plX=-dirY*FOV, plY=dirX*FOV;

  // Cielo y suelo (gradiente por filas)
  for(let y=0;y<SH;y++){
    const isFloor=y>SH/2;
    const rowDist=isFloor? SH/(2*(y-SH/2)) : SH/(2*(SH/2-y));
    const shade=Math.min(1, 1/(rowDist*0.25+0.1));
    let r,g,b;
    if(isFloor){
      r=35*shade; g=25*shade; b=18*shade;
    }else{
      r=12*shade; g=8*shade; b=20*shade;
    }
    const rowOff=y*SW*4;
    for(let x=0;x<SW;x++){
      const idx=rowOff+x*4;
      px[idx]=r; px[idx+1]=g; px[idx+2]=b; px[idx+3]=255;
    }
  }

  // Muros
  for(let x=0;x<SW;x++){
    const cx=2*x/SW-1;
    const rdx=dirX+plX*cx, rdy=dirY+plY*cx;
    const hit=castRay(rdx,rdy);
    const pd=Math.max(0.01,hit.dist);
    zBuf[x]=pd;
    const lh=Math.floor(SH/pd);
    const ds=Math.floor(SH/2-lh/2);
    const de=Math.floor(SH/2+lh/2);
    const tex=textures[hit.wt];
    if(!tex) continue;
    const sideMul=hit.side===1?0.7:1.0;
    for(let y=Math.max(0,ds);y<Math.min(SH,de);y++){
      const ty=Math.floor((y-ds)*TEX/lh);
      const ti=(ty*TEX+hit.tx)*4;
      const shade=Math.min(1, 1/(pd*0.2))*sideMul;
      const idx=(y*SW+x)*4;
      px[idx]=tex[ti]*shade;
      px[idx+1]=tex[ti+1]*shade;
      px[idx+2]=tex[ti+2]*shade;
      px[idx+3]=255;
    }
  }
}

// ===================== SPRITES =====================
function getSpriteData(type){
  if(type==='demon') return sprDemon;
  if(type==='demonDead') return sprDemonDead;
  if(type==='health') return sprHealth;
  if(type==='ammo') return sprAmmo;
  if(type==='armor') return sprArmor;
  return sprDemon;
}

function renderSprites(){
  const dirX=Math.cos(player.angle), dirY=Math.sin(player.angle);
  const plX=-dirY*FOV, plY=dirX*FOV;
  const invDet=1/(plX*dirY-dirX*plY);

  // Recolectar todos los sprites
  let spriteList=[];
  enemies.forEach(e=>{
    const dx=e.x-player.x, dy=e.y-player.y;
    const tx=invDet*(dirY*dx-dirX*dy);
    const ty=invDet*(-plY*dx+plX*dy);
    if(ty<=0.1) return;
    const type=e.state==='dead'?'demonDead':'demon';
    const deadScale=e.state==='dead'?0.3:1;
    spriteList.push({tx,ty,type,deadScale,idx:spriteList.length,isEnemy:true,ref:e});
  });
  pickups.forEach(p=>{
    const dx=p.x-player.x, dy=p.y-player.y;
    const tx=invDet*(dirY*dx-dirX*dy);
    const ty=invDet*(-plY*dx+plX*dy);
    if(ty<=0.1) return;
    spriteList.push({tx,ty,type:p.type,deadScale:0.6,idx:spriteList.length,isEnemy:false,ref:p});
  });

  // Ordenar lejos->cerca
  spriteList.sort((a,b)=>b.ty-a.ty);

  spriteList.forEach(sp=>{
    const spr=getSpriteData(sp.type);
    if(!spr) return;
    const sx=Math.floor(SW/2*(1+sp.tx/sp.ty));
    const sh=Math.abs(Math.floor(SH/sp.ty))*sp.deadScale;
    const sw=sh;
    const x0=Math.floor(sx-sw/2), y0=Math.floor(SH/2-sh/2);
    const shade=Math.min(1, 1/(sp.ty*0.2));
    for(let x=Math.max(0,x0);x<Math.min(SW,x0+sw);x++){
      if(sp.ty>=zBuf[x]) continue;
      const stx=Math.floor((x-x0)*TEX/sw);
      for(let y=Math.max(0,y0);y<Math.min(SH,y0+sh);y++){
        const sty=Math.floor((y-y0)*TEX/sh);
        const si=(sty*TEX+stx)*4;
        if(spr[si+3]<128) continue;
        const idx=(y*SW+x)*4;
        px[idx]=spr[si]*shade;
        px[idx+1]=spr[si+1]*shade;
        px[idx+2]=spr[si+2]*shade;
        px[idx+3]=255;
      }
    }
  });
}

// ===================== PARTÍCULAS =====================
function addParticle(sx,sy,color){
  particles.push({x:sx,y:sy,vx:(Math.random()-0.5)*4,vy:-Math.random()*3,
    life:0.3+Math.random()*0.3,color});
}
function renderParticles(){
  particles.forEach(p=>{
    const idx=(Math.floor(p.y)*SW+Math.floor(p.x))*4;
    if(p.x>=0&&p.x<SW&&p.y>=0&&p.y<SH){
      px[idx]=p.color[0]; px[idx+1]=p.color[1]; px[idx+2]=p.color[2]; px[idx+3]=255;
    }
  });
}

// ===================== ARMA =====================
function drawWeapon(){
  const bob=player.moving?player.bobPhase:0;
  const bx=Math.sin(bob)*10;
  const by=Math.abs(Math.cos(bob))*8;
  const rx=weapon.recoil;
  const ox=SW/2-70+bx;
  const oy=SH-120+by-rx;

  ctx.save();
  // Cañón
  ctx.fillStyle='#505050';
  ctx.fillRect(ox+50,oy-10,50,18);
  ctx.fillStyle='#686868';
  ctx.fillRect(ox+52,oy-8,8,14);
  ctx.fillStyle='#3a3a3a';
  ctx.fillRect(ox+50,oy-10,50,4);
  ctx.fillRect(ox+50,oy+4,50,4);
  // Boca del cañón
  ctx.fillStyle='#222';
  ctx.fillRect(ox+96,oy-8,6,14);
  // Bomba (cilindro inferior)
  ctx.fillStyle='#5a5a5a';
  ctx.fillRect(ox+38,oy+8,56,12);
  ctx.fillStyle='#444';
  ctx.fillRect(ox+38,oy+8,56,3);
  // Guardamano
  ctx.fillStyle='#666';
  ctx.fillRect(ox+36,oy-4,12,24);
  // Culata
  ctx.fillStyle='#6B3A1F';
  ctx.beginPath();
  ctx.moveTo(ox+36,oy-4); ctx.lineTo(ox-10,oy+5);
  ctx.lineTo(ox-10,oy+40); ctx.lineTo(ox+36,oy+32);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='#5C3317';
  ctx.beginPath();
  ctx.moveTo(ox+32,oy); ctx.lineTo(ox-4,oy+8);
  ctx.lineTo(ox-4,oy+36); ctx.lineTo(ox+32,oy+28);
  ctx.closePath(); ctx.fill();
  // Empuñadura
  ctx.fillStyle='#4A2810';
  ctx.fillRect(ox+44,oy+20,18,30);
  ctx.fillStyle='#3A1A08';
  ctx.fillRect(ox+44,oy+20,18,4);
  // Mano
  ctx.fillStyle='#D2A679';
  ctx.fillRect(ox+30,oy+2,22,18);
  ctx.fillRect(ox+40,oy+18,16,12);
  // Dedos
  ctx.fillStyle='#C49A6C';
  for(let i=0;i<4;i++) ctx.fillRect(ox+32+i*5,oy+16,4,6);

  // Flash de disparo
  if(weapon.flash){
    const fx=ox+102, fy=oy+1;
    const grad=ctx.createRadialGradient(fx,fy,2,fx,fy,30);
    grad.addColorStop(0,'#FFFFFF');
    grad.addColorStop(0.3,'#FFAA22');
    grad.addColorStop(0.7,'#FF4400');
    grad.addColorStop(1,'rgba(255,68,0,0)');
    ctx.fillStyle=grad;
    ctx.beginPath(); ctx.arc(fx,fy,30,0,Math.PI*2); ctx.fill();
    // Flash horizontal
    ctx.fillStyle='rgba(255,200,50,0.6)';
    ctx.beginPath(); ctx.ellipse(fx+10,fy,20,8,0,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawFace(cx,cy){
  const hp=player.hp;
  ctx.save();
  // Fondo oval
  ctx.fillStyle='#2a2a2a';
  ctx.beginPath(); ctx.ellipse(cx,cy,24,28,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#555'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(cx,cy,24,28,0,0,Math.PI*2); ctx.stroke();

  // Cara
  const skinColor=hp>50?'#D2A679':hp>25?'#C49A6C':'#A07050';
  ctx.fillStyle=skinColor;
  ctx.beginPath(); ctx.ellipse(cx,cy-2,20,24,0,0,Math.PI*2); ctx.fill();

  // Sangre si dañado
  if(player.dmgFlash>0){
    ctx.fillStyle='rgba(180,0,0,0.5)';
    ctx.beginPath(); ctx.ellipse(cx+5,cy+5,10,8,0.3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx-8,cy+10,6,5,-0.2,0,Math.PI*2); ctx.fill();
  }

  // Ojos
  const lookOff=player.lookDir*3;
  ctx.fillStyle='#FFF';
  ctx.beginPath(); ctx.ellipse(cx-7,cy-6,5,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+7,cy-6,5,4,0,0,Math.PI*2); ctx.fill();
  // Pupilas
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.arc(cx-7+lookOff,cy-6,2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+7+lookOff,cy-6,2.5,0,Math.PI*2); ctx.fill();

  // Cejas
  ctx.strokeStyle='#5A3A1F'; ctx.lineWidth=2;
  if(hp>75){
    ctx.beginPath(); ctx.moveTo(cx-12,cy-13); ctx.lineTo(cx-3,cy-14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+12,cy-13); ctx.lineTo(cx+3,cy-14); ctx.stroke();
  }else if(hp>25){
    ctx.beginPath(); ctx.moveTo(cx-12,cy-11); ctx.lineTo(cx-3,cy-14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+12,cy-11); ctx.lineTo(cx+3,cy-14); ctx.stroke();
  }else{
    ctx.beginPath(); ctx.moveTo(cx-12,cy-10); ctx.lineTo(cx-3,cy-12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+12,cy-10); ctx.lineTo(cx+3,cy-12); ctx.stroke();
  }

  // Boca
  ctx.strokeStyle='#5A3A1F'; ctx.lineWidth=1.5;
  if(hp>75){
    ctx.beginPath(); ctx.arc(cx,cy+6,6,0.1,Math.PI-0.1); ctx.stroke();
  }else if(hp>50){
    ctx.beginPath(); ctx.moveTo(cx-6,cy+6); ctx.lineTo(cx+6,cy+6); ctx.stroke();
  }else if(hp>25){
    ctx.beginPath(); ctx.arc(cx,cy+10,5,Math.PI+0.3,-0.3); ctx.stroke();
  }else{
    ctx.beginPath(); ctx.ellipse(cx,cy+10,6,4,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#600';
    ctx.beginPath(); ctx.ellipse(cx,cy+10,4,3,0,0,Math.PI*2); ctx.fill();
  }

  ctx.restore();
}

// ===================== MINIMAPA =====================
function drawMinimap(){
  if(!showMap) return;
  const scale=6;
  const mw=MW*scale, mh=MH*scale;
  const mx=SW-mw-10, my=10;
  ctx.globalAlpha=0.7;
  ctx.fillStyle='#000';
  ctx.fillRect(mx-1,my-1,mw+2,mh+2);
  for(let y=0;y<MH;y++){
    for(let x=0;x<MW;x++){
      if(MAP[y][x]>0){
        ctx.fillStyle=['','#666','#863','#555','#843'][MAP[y][x]];
        ctx.fillRect(mx+x*scale,my+y*scale,scale,scale);
      }
    }
  }
  // Enemigos
  enemies.forEach(e=>{
    if(e.state==='dead') return;
    ctx.fillStyle='#F00';
    ctx.fillRect(mx+e.x*scale-2,my+e.y*scale-2,4,4);
  });
  // Pickups
  pickups.forEach(p=>{
    ctx.fillStyle=p.type==='health'?'#0F0':p.type==='ammo'?'#FF0':'#0FF';
    ctx.fillRect(mx+p.x*scale-1,my+p.y*scale-1,3,3);
  });
  // Jugador
  ctx.fillStyle='#0F0';
  ctx.beginPath();
  ctx.arc(mx+player.x*scale,my+player.y*scale,3,0,Math.PI*2);
  ctx.fill();
  // Dirección
  ctx.strokeStyle='#0F0'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(mx+player.x*scale,my+player.y*scale);
  ctx.lineTo(mx+player.x*scale+Math.cos(player.angle)*12,
             my+player.y*scale+Math.sin(player.angle)*12);
  ctx.stroke();
  ctx.globalAlpha=1;
}

// ===================== CROSSHAIR =====================
function drawCrosshair(){
  const cx=SW/2, cy=SH/2;
  ctx.strokeStyle='#0F0'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(cx-8,cy); ctx.lineTo(cx-3,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+3,cy); ctx.lineTo(cx+8,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,cy-8); ctx.lineTo(cx,cy-3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,cy+3); ctx.lineTo(cx,cy+8); ctx.stroke();
  // Punto central
  ctx.fillStyle='#0F0';
  ctx.beginPath(); ctx.arc(cx,cy,1,0,Math.PI*2); ctx.fill();
}

      const dot=dx*rdx+dy*rdy;
      if(dot<0) return;
      const px2=dx-dot*rdx, py2=dy-dot*
