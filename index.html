<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelota Soft Body · Física Realista</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #0a0506;
  --bg-mid: #160a0c;
  --red: #e63946;
  --red-bright: #ff5a6a;
  --red-light: #ff8a8a;
  --amber: #ffd166;
  --cream: #f1e8d8;
  --muted: rgba(241, 232, 216, 0.45);
  --border: rgba(230, 57, 70, 0.18);
  --panel: rgba(13, 6, 8, 0.78);
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--bg-deep);
  color: var(--cream);
  font-family: 'JetBrains Mono', monospace;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

canvas {
  display: block;
  position: fixed;
  inset: 0;
  cursor: grab;
  touch-action: none;
}
canvas.grabbing { cursor: grabbing; }

.hud { position: fixed; z-index: 10; pointer-events: none; }

.top-left { top: 28px; left: 28px; max-width: 360px; }

.title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 44px;
  line-height: 0.92;
  letter-spacing: -0.025em;
  color: var(--cream);
}
.title .accent {
  color: var(--red);
  display: block;
  position: relative;
}
.title .accent::after {
  content: '';
  position: absolute;
  left: 0; bottom: -6px;
  width: 40px; height: 3px;
  background: var(--red);
  border-radius: 2px;
}

.subtitle {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  margin-top: 18px;
  margin-bottom: 16px;
  font-weight: 500;
}

.instructions {
  font-size: 12px;
  color: rgba(241, 232, 216, 0.7);
  line-height: 1.9;
}
.instructions kbd {
  background: rgba(230, 57, 70, 0.12);
  border: 1px solid var(--border);
  padding: 2px 7px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--amber);
  margin: 0 1px;
}

.top-right {
  top: 28px;
  right: 28px;
  text-align: right;
  min-width: 220px;
}

.stat-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 12px;
  color: var(--cream);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

.stat {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 7px;
}
.stat .label {
  color: var(--muted);
  text-transform: uppercase;
  font-size: 10px;
  letter-spacing: 0.12em;
}
.stat .value {
  color: var(--amber);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
  font-size: 13px;
}
.stat .value.red { color: var(--red-bright); }
.stat .value.dim { color: var(--cream); opacity: 0.7; }

.bottom {
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  pointer-events: auto;
  display: flex;
  gap: 18px;
  align-items: center;
  background: var(--panel);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--border);
  padding: 14px 22px;
  border-radius: 14px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,209,102,0.04);
}

.control { display: flex; flex-direction: column; gap: 8px; min-width: 130px; }

.control-label {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  display: flex;
  justify-content: space-between;
  font-weight: 500;
}
.control-label .val {
  color: var(--amber);
  font-variant-numeric: tabular-nums;
  font-weight: 700;
}

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 3px;
  background: rgba(241,232,216,0.1);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px; height: 14px;
  background: var(--red);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 0 4px rgba(230,57,70,0.18), 0 2px 8px rgba(230,57,70,0.4);
  transition: transform 0.15s;
}
input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.2);
  box-shadow: 0 0 0 5px rgba(230,57,70,0.25), 0 2px 12px rgba(230,57,70,0.5);
}
input[type="range"]::-moz-range-thumb {
  width: 14px; height: 14px;
  background: var(--red);
  border-radius: 50%;
  cursor: pointer;
  border: none;
  box-shadow: 0 0 0 4px rgba(230,57,70,0.18);
}

.btn {
  background: rgba(230,57,70,0.1);
  border: 1px solid var(--border);
  color: var(--cream);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn:hover {
  background: rgba(230,57,70,0.2);
  border-color: rgba(230,57,70,0.5);
  color: var(--amber);
}
.btn:active { transform: scale(0.96); }
.btn.primary {
  background: var(--red);
  border-color: var(--red);
  color: white;
  box-shadow: 0 4px 14px rgba(230,57,70,0.4);
}
.btn.primary:hover {
  background: var(--red-bright);
  border-color: var(--red-bright);
  color: white;
  box-shadow: 0 6px 20px rgba(230,57,70,0.5);
}

.divider { width: 1px; height: 40px; background: var(--border); }

@media (max-width: 820px) {
  .title { font-size: 28px; }
  .top-left { max-width: 240px; top: 18px; left: 18px; }
  .instructions { font-size: 10px; line-height: 1.7; }
  .top-right { top: 18px; right: 18px; min-width: 160px; }
  .stat { font-size: 10px; }
  .stat .value { font-size: 11px; }
  .bottom {
    gap: 12px; padding: 12px 16px;
    flex-wrap: wrap; justify-content: center;
    max-width: calc(100vw - 24px); bottom: 18px;
  }
  .control { min-width: 100px; }
  .btn { padding: 8px 12px; font-size: 10px; }
  .divider { display: none; }
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; }
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="hud top-left">
  <h1 class="title">PELOTA<span class="accent">SOFT BODY</span></h1>
  <div class="subtitle">Física masa-resorte · Tiempo real</div>
  <div class="instructions">
    <kbd>Click</kbd> + arrastra para lanzar<br>
    <kbd>Doble click</kbd> reinicia la pelota<br>
    <kbd>Espacio</kbd> pausa · <kbd>G</kbd> gravedad cero
  </div>
</div>

<div class="hud top-right">
  <div class="stat-title">Telemetría</div>
  <div class="stat"><span class="label">Velocidad</span><span class="value" id="stat-vel">0.0</span></div>
  <div class="stat"><span class="label">Energía</span><span class="value" id="stat-energy">0</span></div>
  <div class="stat"><span class="label">Altura</span><span class="value dim" id="stat-height">0</span></div>
  <div class="stat"><span class="label">Deformación</span><span class="value red" id="stat-deform">0%</span></div>
  <div class="stat"><span class="label">Impactos</span><span class="value dim" id="stat-hits">0</span></div>
  <div class="stat"><span class="label">FPS</span><span class="value dim" id="stat-fps">60</span></div>
</div>

<div class="hud bottom">
  <div class="control">
    <div class="control-label"><span>Gravedad</span><span class="val" id="val-gravity">0.60</span></div>
    <input type="range" id="gravity" min="0" max="2" step="0.05" value="0.6">
  </div>
  <div class="control">
    <div class="control-label"><span>Rebote</span><span class="val" id="val-bounce">0.78</span></div>
    <input type="range" id="bounce" min="0" max="0.95" step="0.01" value="0.78">
  </div>
  <div class="control">
    <div class="control-label"><span>Elasticidad</span><span class="val" id="val-spring">0.18</span></div>
    <input type="range" id="spring" min="0.05" max="0.4" step="0.01" value="0.18">
  </div>
  <div class="divider"></div>
  <button class="btn" id="btn-pause">Pausa</button>
  <button class="btn primary" id="btn-reset">Reset</button>
</div>

<script>
// ===== Canvas setup con soporte DPI =====
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, groundY;

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  groundY = H - 90;
}
window.addEventListener('resize', resize);
resize();

// ===== Parámetros físicos =====
const params = {
  gravity: 0.6,
  bounce: 0.78,
  spring: 0.18,
  damping: 0.78,
  friction: 0.995,
  paused: false
};

// ===== Pelota soft body =====
const NUM_POINTS = 28;
const ball = {
  cx: 0, cy: 0,
  vx: 0, vy: 0,
  radius: 85,
  points: [],
  grabbed: false,
  grabOX: 0, grabOY: 0,
  trail: [],
  collisions: 0,
  maxDeform: 0
};

function initBall() {
  ball.cx = W / 2;
  ball.cy = H / 3;
  ball.vx = 0;
  ball.vy = 0;
  ball.trail = [];
  ball.collisions = 0;
  ball.points = [];
  for (let i = 0; i < NUM_POINTS; i++) {
    const a = (i / NUM_POINTS) * Math.PI * 2;
    ball.points.push({
      x: ball.cx + Math.cos(a) * ball.radius,
      y: ball.cy + Math.sin(a) * ball.radius,
      ox: Math.cos(a) * ball.radius,
      oy: Math.sin(a) * ball.radius,
      vx: 0, vy: 0
    });
  }
}

// ===== Mouse / Touch con velocidad suavizada =====
const mouse = {
  x: 0, y: 0,
  px: 0, py: 0,
  smoothVx: 0, smoothVy: 0,
  down: false
};

function tryGrab() {
  const dx = mouse.x - ball.cx;
  const dy = mouse.y - ball.cy;
  if (Math.sqrt(dx * dx + dy * dy) < ball.radius * 1.4) {
    ball.grabbed = true;
    ball.grabOX = dx;
    ball.grabOY = dy;
    ball.vx = 0;
    ball.vy = 0;
    mouse.smoothVx = 0;
    mouse.smoothVy = 0;
    canvas.classList.add('grabbing');
  }
}

canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.px = mouse.x;
  mouse.py = mouse.y;
  mouse.down = true;
  tryGrab();
});
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});
window.addEventListener('mouseup', () => {
  if (ball.grabbed) {
    ball.vx = mouse.smoothVx;
    ball.vy = mouse.smoothVy;
    ball.grabbed = false;
    canvas.classList.remove('grabbing');
  }
  mouse.down = false;
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouse.x = t.clientX;
  mouse.y = t.clientY;
  mouse.px = mouse.x;
  mouse.py = mouse.y;
  mouse.down = true;
  tryGrab();
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouse.x = t.clientX;
  mouse.y = t.clientY;
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (ball.grabbed) {
    ball.vx = mouse.smoothVx;
    ball.vy = mouse.smoothVy;
    ball.grabbed = false;
  }
  mouse.down = false;
}, { passive: false });

canvas.addEventListener('dblclick', () => {
  initBall();
  particles.length = 0;
  shockwaves.length = 0;
});

window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    togglePause();
  }
  if (e.key === 'g' || e.key === 'G') {
    const g = params.gravity > 0 ? 0 : 0.6;
    params.gravity = g;
    document.getElementById('gravity').value = g;
    document.getElementById('val-gravity').textContent = g.toFixed(2);
  }
});

// ===== Partículas y ondas de choque =====
const particles = [];
const shockwaves = [];

function spawnParticles(x, y, count, intensity, dirX, dirY) {
  const baseAngle = Math.atan2(dirY, dirX);
  for (let i = 0; i < count; i++) {
    const angle = baseAngle + (Math.random() - 0.5) * Math.PI * 0.9;
    const speed = Math.random() * intensity * 0.7 + intensity * 0.3;
    particles.push({
      x: x + (Math.random() - 0.5) * 6,
      y: y + (Math.random() - 0.5) * 6,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - Math.random() * 2,
      life: 1,
      decay: 0.015 + Math.random() * 0.025,
      size: Math.random() * 2.5 + 1,
      amber: Math.random() < 0.3
    });
  }
}

function spawnShockwave(x, y, intensity) {
  shockwaves.push({
    x, y,
    r: 8,
    maxR: 40 + intensity * 7,
    life: 1
  });
}

// ===== Simulación física =====
function update() {
  if (params.paused) return;
  
  // Suavizar velocidad del mouse para lanzamiento natural
  if (ball.grabbed) {
    mouse.smoothVx = mouse.smoothVx * 0.55 + (mouse.x - mouse.px) * 0.45;
    mouse.smoothVy = mouse.smoothVy * 0.55 + (mouse.y - mouse.py) * 0.45;
  }
  mouse.px = mouse.x;
  mouse.py = mouse.y;
  
  // Limitar velocidad del centro para evitar tunneling
  const maxV = 28;
  const vMag = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
  if (vMag > maxV) {
    ball.vx = (ball.vx / vMag) * maxV;
    ball.vy = (ball.vy / vMag) * maxV;
  }
  
  // === Centro de la pelota ===
  if (ball.grabbed) {
    ball.cx = mouse.x - ball.grabOX;
    ball.cy = mouse.y - ball.grabOY;
  } else {
    ball.vy += params.gravity;
    ball.vx *= params.friction;
    
    // Reacción de los resortes sobre el centro (transmite fuerza de colisiones)
    let fx = 0, fy = 0;
    for (const p of ball.points) {
      const tx = ball.cx + p.ox;
      const ty = ball.cy + p.oy;
      fx += (p.x - tx) * 0.009;
      fy += (p.y - ty) * 0.009;
    }
    ball.vx += fx;
    ball.vy += fy;
    
    ball.cx += ball.vx;
    ball.cy += ball.vy;
  }
  
  // Trail
  ball.trail.push({ x: ball.cx, y: ball.cy });
  if (ball.trail.length > 14) ball.trail.shift();
  
  // === Puntos de superficie (masa-resorte) ===
  let maxDeform = 0;
  for (const p of ball.points) {
    const tx = ball.cx + p.ox;
    const ty = ball.cy + p.oy;
    
    // Fuerza de resorte hacia la posición de reposo
    const dx = tx - p.x;
    const dy = ty - p.y;
    p.vx += dx * params.spring;
    p.vy += dy * params.spring;
    p.vx *= params.damping;
    p.vy *= params.damping;
    p.x += p.vx;
    p.y += p.vy;
    
    // Colisión con suelo
    if (p.y > groundY) {
      const impact = Math.abs(p.vy);
      p.y = groundY;
      p.vy *= -params.bounce;
      p.vx *= 0.9;
      
      if (impact > 2.5 && !ball.grabbed) {
        const cnt = Math.min(Math.floor(impact * 0.9), 16);
        spawnParticles(p.x, groundY - 2, cnt, Math.min(impact * 0.55, 8), 0, -1);
        if (impact > 5) spawnShockwave(p.x, groundY, impact);
        if (impact > 4) ball.collisions++;
      }
    }
    
    // Paredes
    if (p.x < 0) {
      const impact = Math.abs(p.vx);
      p.x = 0;
      p.vx *= -params.bounce;
      if (impact > 2.5 && !ball.grabbed) {
        spawnParticles(0, p.y, Math.min(Math.floor(impact), 10), Math.min(impact * 0.45, 6), 1, 0);
        if (impact > 4) ball.collisions++;
      }
    }
    if (p.x > W) {
      const impact = Math.abs(p.vx);
      p.x = W;
      p.vx *= -params.bounce;
      if (impact > 2.5 && !ball.grabbed) {
        spawnParticles(W, p.y, Math.min(Math.floor(impact), 10), Math.min(impact * 0.45, 6), -1, 0);
        if (impact > 4) ball.collisions++;
      }
    }
    if (p.y < 0) {
      p.y = 0;
      p.vy *= -params.bounce;
    }
    
    // Medir deformación
    const cdx = p.x - ball.cx;
    const cdy = p.y - ball.cy;
    const r = Math.sqrt(cdx * cdx + cdy * cdy);
    const def = Math.abs(r - ball.radius) / ball.radius;
    if (def > maxDeform) maxDeform = def;
  }
  // Suavizar deformación mostrada
  ball.maxDeform = ball.maxDeform * 0.82 + maxDeform * 0.18;
  
  // Partículas
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.vy += 0.28;
    p.vx *= 0.985;
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0 || p.y > H + 20) particles.splice(i, 1);
  }
  
  // Ondas
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    const s = shockwaves[i];
    s.r += (s.maxR - s.r) * 0.18;
    s.life -= 0.035;
    if (s.life <= 0) shockwaves.splice(i, 1);
  }
}

// ===== Render =====
function draw() {
  // Fondo con degradado cálido oscuro
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0a0506');
  bg.addColorStop(0.55, '#170a0c');
  bg.addColorStop(1, '#2a1010');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
  
  // Glow superior
  const topGlow = ctx.createRadialGradient(W * 0.5, -100, 0, W * 0.5, -100, Math.max(1, W * 0.7));
  topGlow.addColorStop(0, 'rgba(230, 57, 70, 0.15)');
  topGlow.addColorStop(1, 'rgba(230, 57, 70, 0)');
  ctx.fillStyle = topGlow;
  ctx.fillRect(0, 0, W, H);
  
  // Rejilla del suelo en perspectiva
  ctx.strokeStyle = 'rgba(230, 57, 70, 0.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 15; i++) {
    const y = groundY + i * i * 2.5;
    if (y > H) break;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  const vpx = W / 2;
  for (let i = -8; i <= 8; i++) {
    if (i === 0) continue;
    const x = vpx + i * (W / 12);
    ctx.beginPath();
    ctx.moveTo(x, groundY);
    ctx.lineTo(vpx + (x - vpx) * 12, H + 50);
    ctx.stroke();
  }
  
  // Línea de suelo con glow
  ctx.shadowColor = '#e63946';
  ctx.shadowBlur = 18;
  ctx.strokeStyle = 'rgba(230, 57, 70, 0.85)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();
  ctx.shadowBlur = 0;
  
  // Reflex en el suelo
  const reflGrad = ctx.createLinearGradient(0, groundY, 0, groundY + 100);
  reflGrad.addColorStop(0, 'rgba(230, 57, 70, 0.08)');
  reflGrad.addColorStop(1, 'rgba(230, 57, 70, 0)');
  ctx.fillStyle = reflGrad;
  ctx.fillRect(0, groundY, W, 100);
  
  // Sombra de la pelota en el suelo (escala con la altura)
  const heightAbove = Math.max(0, groundY - ball.cy);
  const shadowScale = Math.max(0.15, 1 - heightAbove / 500);
  ctx.fillStyle = `rgba(0, 0, 0, ${shadowScale * 0.55})`;
  ctx.beginPath();
  const shadowW = Math.max(1, ball.radius * shadowScale * 1.15);
  ctx.ellipse(ball.cx, groundY + 3, shadowW, shadowW * 0.28, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Ondas de choque
  for (const s of shockwaves) {
    ctx.strokeStyle = `rgba(255, 209, 102, ${s.life * 0.65})`;
    ctx.lineWidth = Math.max(0.1, 2.5 * s.life);
    ctx.beginPath();
    ctx.ellipse(s.x, s.y, Math.max(1, s.r), Math.max(0.3, s.r * 0.3), 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = `rgba(255, 90, 106, ${s.life * 0.4})`;
    ctx.lineWidth = Math.max(0.1, 1.5 * s.life);
    ctx.beginPath();
    ctx.ellipse(s.x, s.y, Math.max(1, s.r * 0.7), Math.max(0.2, s.r * 0.21), 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  
  // Trail
  for (let i = 0; i < ball.trail.length; i++) {
    const t = ball.trail[i];
    const alpha = (i / ball.trail.length) * 0.2;
    const r = Math.max(0.5, ball.radius * (i / ball.trail.length) * 0.55);
    ctx.fillStyle = `rgba(230, 57, 70, ${alpha})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Pelota
  drawBall();
  
  // Indicador de agarre + vector de lanzamiento
  if (ball.grabbed) {
    const t = performance.now() * 0.003;
    ctx.strokeStyle = 'rgba(255, 209, 102, 0.35)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 7]);
    ctx.lineDashOffset = -t * 30;
    ctx.beginPath();
    ctx.arc(ball.cx, ball.cy, ball.radius * 1.45, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.lineDashOffset = 0;
    
    const v = Math.sqrt(mouse.smoothVx ** 2 + mouse.smoothVy ** 2);
    if (v > 1.5) {
      const ang = Math.atan2(mouse.smoothVy, mouse.smoothVx);
      const len = Math.min(v * 6, 180);
      const ex = ball.cx + Math.cos(ang) * len;
      const ey = ball.cy + Math.sin(ang) * len;
      ctx.strokeStyle = 'rgba(255, 209, 102, 0.45)';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 6]);
      ctx.beginPath();
      ctx.moveTo(ball.cx, ball.cy);
      ctx.lineTo(ex, ey);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(255, 209, 102, 0.7)';
      ctx.beginPath();
      ctx.moveTo(ex, ey);
      ctx.lineTo(ex - Math.cos(ang - 0.4) * 12, ey - Math.sin(ang - 0.4) * 12);
      ctx.lineTo(ex - Math.cos(ang + 0.4) * 12, ey - Math.sin(ang + 0.4) * 12);
      ctx.fill();
    }
  }
  
  // Partículas
  for (const p of particles) {
    const a = p.life;
    if (p.amber) {
      ctx.fillStyle = `rgba(255, 209, 102, ${a})`;
    } else {
      ctx.fillStyle = `rgba(255, ${Math.floor(90 + 90 * a)}, ${Math.floor(110 * a)}, ${a})`;
    }
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.3, p.size * Math.max(0.3, a)), 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBall() {
  const pts = ball.points;
  const n = pts.length;
  
  // Construir path suave con curvas cuadráticas
  ctx.beginPath();
  const midX0 = (pts[0].x + pts[n - 1].x) / 2;
  const midY0 = (pts[0].y + pts[n - 1].y) / 2;
  ctx.moveTo(midX0, midY0);
  for (let i = 0; i < n; i++) {
    const curr = pts[i];
    const next = pts[(i + 1) % n];
    const midX = (curr.x + next.x) / 2;
    const midY = (curr.y + next.y) / 2;
    ctx.quadraticCurveTo(curr.x, curr.y, midX, midY);
  }
  ctx.closePath();
  
  ctx.save();
  ctx.clip();
  
  // Gradiente radial principal
  const lightX = ball.cx - ball.radius * 0.3;
  const lightY = ball.cy - ball.radius * 0.35;
  const grad = ctx.createRadialGradient(
    lightX, lightY, Math.max(1, ball.radius * 0.05),
    ball.cx, ball.cy, Math.max(2, ball.radius * 1.4)
  );
  grad.addColorStop(0, '#ff9a9a');
  grad.addColorStop(0.25, '#ee4458');
  grad.addColorStop(0.6, '#c82330');
  grad.addColorStop(1, '#5a0c14');
  ctx.fillStyle = grad;
  ctx.fillRect(ball.cx - ball.radius * 2.5, ball.cy - ball.radius * 2.5, ball.radius * 5, ball.radius * 5);
  
  // Sombra inferior interna
  const shadeGrad = ctx.createRadialGradient(
    ball.cx, ball.cy + ball.radius * 0.4, Math.max(1, ball.radius * 0.1),
    ball.cx, ball.cy + ball.radius * 0.7, Math.max(2, ball.radius * 1.5)
  );
  shadeGrad.addColorStop(0, 'rgba(0, 0, 0, 0)');
  shadeGrad.addColorStop(0.5, 'rgba(0, 0, 0, 0.15)');
  shadeGrad.addColorStop(1, 'rgba(0, 0, 0, 0.5)');
  ctx.fillStyle = shadeGrad;
  ctx.fillRect(ball.cx - ball.radius * 2.5, ball.cy - ball.radius * 2.5, ball.radius * 5, ball.radius * 5);
  
  // Highlight suave
  const hlGrad = ctx.createRadialGradient(
    lightX, lightY, 0,
    lightX, lightY, Math.max(2, ball.radius * 0.7)
  );
  hlGrad.addColorStop(0, 'rgba(255, 240, 240, 0.7)');
  hlGrad.addColorStop(0.4, 'rgba(255, 200, 200, 0.25)');
  hlGrad.addColorStop(1, 'rgba(255, 200, 200, 0)');
  ctx.fillStyle = hlGrad;
  ctx.fillRect(ball.cx - ball.radius * 2.5, ball.cy - ball.radius * 2.5, ball.radius * 5, ball.radius * 5);
  
  // Brillo pequeño
  ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
  ctx.beginPath();
  ctx.arc(ball.cx - ball.radius * 0.38, ball.cy - ball.radius * 0.42, Math.max(1, ball.radius * 0.09), 0, Math.PI * 2);
  ctx.fill();
  
  ctx.restore();
  
  // Contorno
  ctx.beginPath();
  ctx.moveTo(midX0, midY0);
  for (let i = 0; i < n; i++) {
    const curr = pts[i];
    const next = pts[(i + 1) % n];
    const midX = (curr.x + next.x) / 2;
    const midY = (curr.y + next.y) / 2;
    ctx.quadraticCurveTo(curr.x, curr.y, midX, midY);
  }
  ctx.closePath();
  ctx.strokeStyle = 'rgba(40, 5, 8, 0.6)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  
  // Glow exterior
  ctx.shadowColor = 'rgba(230, 57, 70, 0.5)';
  ctx.shadowBlur = 20;
  ctx.strokeStyle = 'rgba(230, 57, 70, 0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.shadowBlur = 0;
}

// ===== Stats =====
const statEls = {
  vel: document.getElementById('stat-vel'),
  energy: document.getElementById('stat-energy'),
  height: document.getElementById('stat-height'),
  deform: document.getElementById('stat-deform'),
  hits: document.getElementById('stat-hits'),
  fps: document.getElementById('stat-fps')
};

function updateStats() {
  const vel = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
  statEls.vel.textContent = vel.toFixed(2);
  statEls.energy.textContent = Math.round(vel * vel * 0.5);
  statEls.height.textContent = Math.max(0, Math.round(groundY - ball.cy));
  statEls.deform.textContent = (ball.maxDeform * 100).toFixed(0) + '%';
  statEls.hits.textContent = ball.collisions;
  statEls.fps.textContent = Math.round(fps);
}

// ===== Loop principal =====
let frameCount = 0;
let fps = 60;
let fpsTime = performance.now();

function loop(now) {
  frameCount++;
  if (now - fpsTime > 500) {
    fps = frameCount * 1000 / (now - fpsTime);
    frameCount = 0;
    fpsTime = now;
  }
  
  update();
  draw();
  updateStats();
  
  requestAnimationFrame(loop);
}

// ===== Controles =====
function togglePause() {
  params.paused = !params.paused;
  document.getElementById('btn-pause').textContent = params.paused ? 'Reanudar' : 'Pausa';
}

document.getElementById('gravity').addEventListener('input', e => {
  params.gravity = parseFloat(e.target.value);
  document.getElementById('val-gravity').textContent = params.gravity.toFixed(2);
});
document.getElementById('bounce').addEventListener('input', e => {
  params.bounce = parseFloat(e.target.value);
  document.getElementById('val-bounce').textContent = params.bounce.toFixed(2);
});
document.getElementById('spring').addEventListener('input', e => {
  params.spring = parseFloat(e.target.value);
  document.getElementById('val-spring').textContent = params.spring.toFixed(2);
});
document.getElementById('btn-pause').addEventListener('click', togglePause);
document.getElementById('btn-reset').addEventListener('click', () => {
  initBall();
  particles.length = 0;
  shockwaves.length = 0;
});

// ===== Arranque =====
initBall();
requestAnimationFrame(loop);
</script>
