<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nivel 1 - El Laberinto</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 4px; height: 4px; background: rgba(255,255,255,0.8);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; mix-blend-mode: difference;
        }
        #message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-family: monospace; font-size: 20px;
            background: rgba(0,0,0,0.8); padding: 20px; border: 1px solid red;
            pointer-events: none; text-align: center;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>
    <div id="crosshair"></div>
    <div id="message">NIVEL 1: EL LABERINTO<br><small>Audio Activo. Escucha al monstruo.</small></div>
    
    <!-- CARGA DE SCRIPTS -->
    <script src="../common.js"></script> 
    <script src="game.js"></script>
    <script src="mazeGenerator.js"></script>
    <script src="entity.js"></script>
    <script src="audioGen.js"></script>  <!-- NUEVO: Audio -->
    <script src="sanity.js"></script>    <!-- NUEVO: Cordura -->

    <script>
        let killer = null;
        let stepTimer = 0;

        window.startLevelLogic = function(scene, walls, camera) {
            // Iniciar sistemas
            initAudio();
            initSanity();

            console.log("Generando Laberinto...");

            const wallCanvas = getWallCanvas();
            const texture = new THREE.CanvasTexture(wallCanvas);
            const wallMat = new THREE.MeshStandardMaterial({ map: texture });

            const spawnPos = buildMazeFromGrid(scene, walls, wallMat);
            camera.position.set(spawnPos.x, 0, spawnPos.z);

            killer = createEntity(scene);
            killer.position.set(spawnPos.x + 5, 0, spawnPos.z + 5); 

            const goalGeo = new THREE.BoxGeometry(1, 1, 1);
            const goalMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            const goal = new THREE.Mesh(goalGeo, goalMat);
            goal.position.set(-spawnPos.x, 0, -spawnPos.z); 
            
            const goalLight = new THREE.PointLight(0x00ff00, 2, 10);
            goalLight.position.copy(goal.position);
            scene.add(goalLight);
            scene.add(goal);
            window.goalObject = goal;
        };

        // Actualización principal (Llamada por game.js)
        window.updateEntity = function(delta, playerPos) {
            if (!killer) return;

            const dist = killer.position.distanceTo(playerPos);

            // 1. Actualizar Audio del Monstruo
            updateMonsterSound(dist);

            // 2. Actualizar Cordura (Si está cerca de 10 unidades)
            updateSanity(delta, dist < 10);

            // 3. IA del Monstruo
            if (dist > 1.5 && dist < 20) {
                const direction = new THREE.Vector3().subVectors(playerPos, killer.position).normalize();
                killer.position.add(direction.multiplyScalar(2.5 * delta));
                killer.lookAt(playerPos.x, killer.position.y, playerPos.z);
                killer.position.y = Math.sin(Date.now() * 0.005) * 0.2;
            }
            
            if (dist < 1.0) {
                document.body.style.background = "red";
                setTimeout(() => alert("¡TE HA ATRAPADO!"), 100);
                location.reload();
            }
        };

        // --- DETECCIÓN DE PASOS (Extra) ---
        // Esto se ejecuta fuera de updateEntity para conectar con el teclado
        setInterval(() => {
            // Esto es un truco para detectar si te mueves, 
            // en un sistema perfecto esto iría dentro de animate() de game.js
            if (window.moveForward || window.moveBackward || window.moveLeft || window.moveRight) {
                playStepSound();
            }
        }, 400); // Cada 400ms un paso

        window.levelWin = function() {
            alert("¡Nivel 1 Completado!");
            window.location.href = 'level2.html';
        }
    </script>
</body>
</html>
