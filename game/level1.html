<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nivel 1 - El Laberinto</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; user-select: none; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 4px; height: 4px; background: rgba(255,255,255,0.8);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 5;
        }
        #message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-family: 'Courier New', monospace; font-size: 22px;
            background: rgba(0,0,0,0.9); padding: 30px; border: 2px solid #8B0000;
            pointer-events: none; text-align: center; z-index: 10;
        }
        #message small { display: block; margin-top: 10px; color: #aaa; font-size: 16px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>
    <div id="crosshair"></div>
    <div id="message">HAZ CLICK PARA COMENZAR<br><small>WASD: Moverse | E: Abrir | F: Linterna</small></div>
    
    <script src="../common.js"></script> 
    <script src="game.js"></script>
    <script src="controls.js"></script>
    <script src="items.js"></script>
    <script src="mazeGenerator.js"></script>
    <script src="entity.js"></script>
    <script src="interactions.js"></script>
    <script src="audioGen.js"></script>
    <script src="sanity.js"></script>

    <script>
        let killer = null;

        window.startLevelLogic = function(scene, walls, camera) {
            initAudio();
            initSanity();
            initInteraction(scene);

            const wallCanvas = getWallCanvas();
            const texture = new THREE.CanvasTexture(wallCanvas);
            const wallMat = new THREE.MeshStandardMaterial({ map: texture });

            const spawnPos = buildMazeFromGrid(scene, walls, wallMat);
            camera.position.set(spawnPos.x, 1.6, spawnPos.z);
            
            const startLight = new THREE.PointLight(0xffaa00, 0.8, 10);
            startLight.position.set(spawnPos.x, 1, spawnPos.z);
            scene.add(startLight);

            createDoor(scene, spawnPos.x, 0, spawnPos.z - 4);

            killer = createEntity(scene);
            killer.position.set(spawnPos.x + 5, 0, spawnPos.z + 5);

            const goalGeo = new THREE.BoxGeometry(1, 1, 1);
            const goalMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            const goal = new THREE.Mesh(goalGeo, goalMat);
            goal.position.set(-spawnPos.x, 1, -spawnPos.z); 
            
            const goalLight = new THREE.PointLight(0x00ff00, 2, 15);
            goalLight.position.copy(goal.position);
            scene.add(goalLight);
            scene.add(goal);
            window.goalObject = goal;
        };

        window.updateEntity = function(delta, playerPos) {
            if (!killer) return;
            checkInteraction(window.camera);
            const dist = killer.position.distanceTo(playerPos);
            updateMonsterSound(dist);
            updateSanity(delta, dist < 10);

            if (dist > 1.5 && dist < 20) {
                const direction = new THREE.Vector3().subVectors(playerPos, killer.position).normalize();
                killer.position.add(direction.multiplyScalar(2.5 * delta));
                killer.lookAt(playerPos.x, killer.position.y, playerPos.z);
                killer.position.y = Math.sin(Date.now() * 0.005) * 0.2;
            }
            
            if (dist < 1.0) {
                document.body.style.background = "red";
                setTimeout(() => alert("¡GAME OVER!"), 100);
                location.reload();
            }
        };

        setInterval(() => {
            if (window.inputActive) {
                playStepSound();
            }
        }, 450);

        window.levelWin = function() {
            alert("¡Nivel 1 Terminado!");
            window.location.href = 'level2.html';
        }
    </script>
</body>
</html>
