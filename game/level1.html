<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nivel 1 - El Despertar</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 4px; height: 4px; background: rgba(255,255,255,0.8);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; mix-blend-mode: difference;
        }
        #message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-family: monospace; font-size: 20px;
            background: rgba(0,0,0,0.7); padding: 20px; border: 1px solid white;
            pointer-events: none; text-align: center;
        }
    </style>
    <!-- Librerías -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>
    <div id="crosshair"></div>
    <!-- Mensaje UI -->
    <div id="message">HAZ CLICK PARA EMPEZAR<br><small>WASD para Moverse</small></div>
    
    <script src="../common.js"></script> 
    <script src="game.js"></script>

    <script>
        // --- LÓGICA DEL NIVEL 1 ---
        window.startLevelLogic = function(scene, walls, camera) {
            console.log("Nivel 1 Generado");

            // Textura
            const wallCanvas = getWallCanvas();
            const texture = new THREE.CanvasTexture(wallCanvas);
            const mat = new THREE.MeshStandardMaterial({ map: texture });
            const geo = new THREE.BoxGeometry(10, 5, 1);

            // --- Crear Pasillo Inmediato (Para referencia visual) ---
            // Paredes alrededor del punto de inicio (0,0,0)
            // Izquierda
            createWall(scene, walls, mat, geo, -5, 0.5, -5);
            createWall(scene, walls, mat, geo, -5, 0.5, -10);
            createWall(scene, walls, mat, geo, -5, 0.5, -15);
            
            // Derecha
            createWall(scene, walls, mat, geo, 5, 0.5, -5);
            createWall(scene, walls, mat, geo, 5, 0.5, -10);
            createWall(scene, walls, mat, geo, 5, 0.5, -15);

            // Fondo del pasillo (Objetivo al fondo)
            createWall(scene, walls, mat, geo, 0, 0.5, -20);

            // Cerrar atrás (para no volver)
            createWall(scene, walls, mat, geo, 0, 0.5, 2);

            // --- LUZ DE REFERENCIA EN EL INICIO ---
            // Una luz tenue roja justo donde empiezas para que veas las paredes cercanas
            const startLight = new THREE.PointLight(0xff0000, 0.8, 15);
            startLight.position.set(0, 2, 0);
            scene.add(startLight);

            // --- OBJETIVO ---
            const goalGeo = new THREE.BoxGeometry(1, 1, 1);
            const goalMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const goal = new THREE.Mesh(goalGeo, goalMat);
            goal.position.set(0, 0, -18); // Justo delante de la pared final
            
            const goalLight = new THREE.PointLight(0xff0000, 2, 10);
            goalLight.position.set(0, 0, -18);
            scene.add(goalLight);

            scene.add(goal);
            window.goalObject = goal; 
            
            const animateGoal = () => {
                if(document.body.contains(goal)) {
                    goal.rotation.x += 0.02;
                    goal.rotation.y += 0.02;
                    requestAnimationFrame(animateGoal);
                }
            };
            animateGoal();
        };

        function createWall(scene, wallsArray, material, geometry, x, y, z) {
            const wall = new THREE.Mesh(geometry, material);
            wall.position.set(x, y, z);
            scene.add(wall);
            wallsArray.push(wall);
        }

        window.levelWin = function() {
            window.location.href = 'level2.html';
        }
    </script>
</body>
</html>
